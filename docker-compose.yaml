name: ntfy
services:
  app:
    image: binwiederhier/ntfy:latest
    container_name: ntfy-app
    hostname: ntfy
    restart: always
    pull_policy: always
    command:
      - serve
    environment:
      - TZ=${TZ:-America/New_York}
    ports:
      - 172.17.0.1:59091:80
    volumes:
      - /var/lib/srv/$USER/docker/binwiederhier/ntfy/latest/rootfs/config/ntfy:/etc/ntfy
      - /var/lib/srv/$USER/docker/binwiederhier/ntfy/latest/rootfs/data/ntfy:/var/cache/ntfy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 600s
    networks:
      - ntfy

networks:
  ntfy:
    name: ntfy
    external: false
